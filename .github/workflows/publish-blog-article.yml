name: Publish Blog Article

# Publication progressive des articles blog (anti content-dump).
# Tourne tous les 2 jours (jours impairs) à 06:11 UTC (08:11 Paris été, 07:11 hiver).
# Le script publie le 1er article encore en status:brouillon dans la queue
# scripts/blog-publish-queue.json (ordre piliers + volume). Commit + push automatique.
#
# Pour mettre en pause : commenter le bloc schedule (workflow_dispatch reste actif).

on:
  schedule:
    - cron: '11 6 1-31/2 * *'
  workflow_dispatch: # Déclenchement manuel possible depuis l'onglet Actions

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run blog publication script
        id: publish
        run: node scripts/publish-next-blog-article.mjs

      - name: Commit and push
        run: |
          git config user.name "Enomia Bot"
          git config user.email "bot@enomia.app"
          git add -A
          # Ne commit que s'il y a un changement (article publié)
          git diff --staged --quiet || git commit -m "chore(blog): publish next article ($(date +%Y-%m-%d))"
          git push

      - name: Send recap email
        # Ne s'exécute que si un article a effectivement été publié
        if: steps.publish.outputs.published_slug != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "📝 Article blog publié : ${{ steps.publish.outputs.published_title }}"
          to: marc@enomia.app
          from: Enomia Bot <marc@enomia.app>
          body: |
            Nouvel article publié automatiquement sur le blog Enomia.

            Titre : ${{ steps.publish.outputs.published_title }}
            URL   : https://www.enomia.app/blog/${{ steps.publish.outputs.published_slug }}

            Publié par le cron publish-blog-article (1 article tous les 2 jours).
            Prochaine publication : prochain jour impair à 06:11 UTC.

            Pour réordonner ou ajouter des articles : scripts/blog-publish-queue.json
            Pour mettre en pause : commenter le bloc schedule dans
            .github/workflows/publish-blog-article.yml
